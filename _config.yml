
title: 中国社会民族主义论坛
description: 探讨中国社会发展的现实路径与意识形态分析
baseurl: ""
url: "https://daniek0617.github.io/zhongminlun"
remote_theme: mmistakes/minimal-mistakes
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-paginate
  - jekyll-include-cache
markdown: kramdown
kramdown:
  input: GFM
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      comments: true
      share: true
      related: true
paginate: 5
paginate_path: /page:num/
comments:
  provider: "giscus"
  giscus:
    repo_id: ""
    category: ""
    category_id: ""
    mapping: "pathname"
    reactions_enabled: "1"
    theme: "light"
